# ====================================
# 服务器配置
# ====================================
# 应用运行端口
server.port=8080
# Tomcat 异步请求超时时间(毫秒),流式响应需要更长的超时时间
server.tomcat.async-timeout=300000
# 连接超时时间(毫秒)
server.tomcat.connection-timeout=20000

# 允许 Bean 定义覆盖（解决 LangChain4j 自动配置冲突）
spring.main.allow-bean-definition-overriding=true

# ====================================
# OpenAI 兼容模型配置（DeepSeek）
# ====================================
# DeepSeek API 基础地址
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
# API 密钥，从环境变量读取（安全做法，避免硬编码在配置文件中）
langchain4j.open-ai.chat-model.api-key=${DASH_SCOPE_API_KEY}

# 模型名称：deepseek-chat（对话模型）或 deepseek-reasoner（推理模型）
langchain4j.open-ai.chat-model.model-name=deepseek-v3


# 启用请求日志记录（调试用）
langchain4j.open-ai.chat-model.log-requests=true
# 启用响应日志记录（调试用）
langchain4j.open-ai.chat-model.log-responses=true

#MongoDB连接配置
spring.data.mongodb.uri=mongodb://localhost:27017/chat_memory_db

# 基本数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/guiguxiaozhi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 开启 SQL 日志打印
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ====================================
# Ollama 本地模型配置
# ====================================
# Ollama 服务地址
langchain4j.ollama.chat-model.base-url=http://localhost:11434
# 模型名称：使用 Qwen2.5-coder 的 latest 版本
langchain4j.ollama.chat-model.model-name=qwen2.5-coder:latest
# 温度参数：控制生成文本的随机性（0.0-2.0，越高越随机）
langchain4j.ollama.chat-model.temperature=0.8
# 超时时间：PT60S 表示 60 秒（ISO-8601 格式）
langchain4j.ollama.chat-model.timeout=PT60S

#阿里百炼平台
langchain4j.community.dashscope.chat-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.chat-model.model-name=qwen3.6-max-preview

#集成阿里通义千问-流式输出
langchain4j.community.dashscope.streaming-chat-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-max

#集成阿里通义千问-通用文本向量-v3
langchain4j.community.dashscope.embedding-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v3

# 启用请求日志记录（调试用）
langchain4j.ollama.chat-model.log-requests=true
# 启用响应日志记录（调试用）
langchain4j.ollama.chat-model.log-responses=true

# ====================================
# 日志配置
# ====================================
# 根日志级别设置为 debug，会输出所有框架和应用的详细日志
logging.level.root=info
# 忽略客户端断开连接的异常日志(避免流式响应时日志污染)
logging.level.org.apache.catalina.connector.ClientAbortException=WARN
# Pinecone 相关的配置
pinecone.enabled=true
pinecone.api.key=${PINECONE_API_KEY}
# Redis 配置
spring.data.redis.host=192.168.100.128
spring.data.redis.port=6379
spring.data.redis.database=6
spring.data.redis.password=123456
spring.data.redis.timeout=2000ms
# Redis 连接池配置
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms
# 阿里云 OSS 配置
sky.aliyun.oss.endpoint=https://oss-cn-beijing.aliyuncs.com
sky.aliyun.oss.bucketName=java-huangma
sky.aliyun.oss.region=cn-beijing